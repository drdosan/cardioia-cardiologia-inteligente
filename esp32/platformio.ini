; CardioIA Fase 3 — ESP32 (Arduino)
; Abra esta pasta no VS Code: File → Open Folder → esp32
; Depois use PlatformIO: Build / Upload / Monitor
;
; esp32dev        = placa física (WIFI_SSID / WIFI_PASS do secrets.h)
; esp32dev_wokwi  = simulador Wokwi + MQTT (Wi-Fi virtual Wokwi-GUEST — ver README)

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; Registry às vezes não resolve "beegee-tokyo/DHTesp" — usar GitHub (tag 1.19)
lib_deps =
  https://github.com/beegee-tokyo/DHTesp.git#1.19
  knolleary/PubSubClient@^2.8

build_flags =
  -DCORE_DEBUG_LEVEL=0
  -std=gnu++17

[env:esp32dev_wokwi]
extends = env:esp32dev
build_flags =
  ${env:esp32dev.build_flags}
  -DCARDIOIA_WOKWI_SIM=1
